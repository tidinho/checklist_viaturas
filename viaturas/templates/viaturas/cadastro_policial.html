<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cadastro de Policial</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#f4f6f9;
}

.card{
border-radius:10px;
}

@media (max-width:576px){

.card{
margin:10px;
}

h4{
font-size:20px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-12 col-sm-10 col-md-6 col-lg-4">

<div class="card shadow">

<div class="card-body">

<h4 class="text-center mb-4">Cadastro de Policial</h4>

<form method="post">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">Usuário</label>
<input type="text" name="username" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Nome de Guerra</label>
<input type="text" name="nome_guerra" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Senha</label>
<input type="password" name="password" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Confirmar Senha</label>
<input type="password" name="password2" class="form-control" required>
</div>

<button class="btn btn-primary w-100">
Cadastrar
</button>

</form>

<div class="text-center mt-3">
<a href="{% url 'login' %}">Voltar para Login</a>
</div>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
